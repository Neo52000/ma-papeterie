# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_SUPABASE_URL = "https://mgojmkzovqgpipybelrr.supabase.co"
  VITE_SUPABASE_PUBLISHABLE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1nb2pta3pvdnFncGlweWJlbHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTg3NjY5NTEsImV4cCI6MjA3NDM0Mjk1MX0.o3LbQ2cQYIc18KEzl15Yn-YAeCustLEwwjz94XX4ltM"
  # VITE_SENTRY_DSN is set in Netlify environment variables

# ── Edge Functions — pre-rendering pour les crawlers ─────────────────────────
[[edge_functions]]
  function = "prerender"
  path     = "/produit/*"

# ── Sitemaps produits dynamiques (proxy vers Supabase Edge Function) ──────────
[[redirects]]
  from   = "/sitemap-products-:page.xml"
  to     = "https://mgojmkzovqgpipybelrr.supabase.co/functions/v1h/sitemap-products?page=:page"
  status = 200
  force  = true

# ── SPA routing : toutes les routes → index.html ──────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Deploy Preview for feature branches (staging) ──────────────────────────────
[context.branch-deploy]
  command = "npm run build"
  environment = { NODE_ENV = "staging" }

[context.deploy-preview]
  environment = { NODE_ENV = "staging" }

# ── Headers cache ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Sécurité ──────────────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=(self), payment=(self \"https://js.stripe.com\")"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # NOTE: 'unsafe-inline' dans style-src est requis par Radix UI (injection de styles inline).
    # TODO: Migrer vers des nonces CSS ou CSS Modules pour supprimer 'unsafe-inline'.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://*.myshopify.com https://api.srv1475682.hstgr.cloud https://www.google-analytics.com https://www.googletagmanager.com https://api.stripe.com; frame-src https://www.google.com https://maps.google.com https://js.stripe.com; object-src 'none'; base-uri 'self'; form-action 'self' https://*.myshopify.com; frame-ancestors 'self'"
