name: Sync Alkor Catalog

on:
  schedule:
    - cron: "0 6 * * *" # Tous les jours à 6h UTC
  workflow_dispatch: # Déclenchement manuel ou via API
    inputs:
      crawl_job_id:
        description: "Crawl job ID for progress tracking (optional)"
        required: false
        type: string
      upload_images:
        description: "Upload images to Supabase Storage"
        required: false
        default: "true"
        type: string

jobs:
  sync:
    name: Scrape & Sync (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Alkor scraper (Playwright)
        env:
          ALKOR_CLIENT_CODE: ${{ secrets.ALKOR_CLIENT_CODE }}
          ALKOR_USERNAME: ${{ secrets.ALKOR_USERNAME }}
          ALKOR_PASSWORD: ${{ secrets.ALKOR_PASSWORD }}
          ALKOR_BASE_URL: ${{ secrets.ALKOR_BASE_URL }}
          UPLOAD_IMAGES_SUPABASE: ${{ inputs.upload_images || 'true' }}
          PUSH_TO_SUPABASE: ${{ secrets.SUPABASE_URL && 'true' || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWL_JOB_ID: ${{ inputs.crawl_job_id || '' }}
        run: npx tsx scripts/scrape-alkor-pw.ts

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: error-screenshots
          path: scripts/screenshots/
          retention-days: 7

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if [ -d "public/images/products" ]; then
            git add public/images/products/
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: Alkor catalog update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Sync Alkor failed (${new Date().toISOString().slice(0,10)})`,
              body: `The scheduled Alkor sync workflow failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Time:** ${new Date().toISOString()}`,
              labels: ['sync-failure', 'automated']
            });

      - name: Trigger Netlify rebuild
        if: env.NETLIFY_BUILD_HOOK != ''
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          curl -s -X POST "$NETLIFY_BUILD_HOOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
          && echo "Netlify rebuild triggered" \
          || echo "Warning: Netlify rebuild trigger failed"

