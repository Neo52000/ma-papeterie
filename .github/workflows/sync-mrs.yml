name: Sync MRS Catalog

on:
  workflow_dispatch:
    inputs:
      crawl_job_id:
        description: "Crawl job ID for progress tracking (optional)"
        required: false
        type: string
      upload_images:
        description: "Upload images to Supabase Storage"
        required: false
        default: "true"
        type: string

jobs:
  sync:
    name: Scrape ma-rentree-scolaire.fr (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

