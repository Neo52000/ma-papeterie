name: Sync MRS Catalog

on:
  workflow_dispatch:
    inputs:
      crawl_job_id:
        description: "Crawl job ID for progress tracking (optional)"
        required: false
        type: string
      upload_images:
        description: "Upload images to Supabase Storage"
        required: false
        default: "true"
        type: string

jobs:
  sync:
    name: Scrape ma-rentree-scolaire.fr (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run MRS scraper (Playwright)
        env:
          MRS_BASE_URL: "https://ma-rentree-scolaire.fr"
          UPLOAD_IMAGES_SUPABASE: ${{ inputs.upload_images || 'true' }}
          PUSH_TO_SUPABASE: ${{ secrets.SUPABASE_URL && 'true' || 'false' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRAWL_JOB_ID: ${{ inputs.crawl_job_id || '' }}
        run: npx tsx scripts/scrape-mrs-pw.ts

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: scripts/screenshots/
          retention-days: 7

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update MRS catalog $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Trigger Netlify rebuild
        if: env.NETLIFY_BUILD_HOOK != ''
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          curl -s -X POST "$NETLIFY_BUILD_HOOK" \
            -H "Content-Type: application/json" \
            -d '{}' \
            && echo "Netlify rebuild triggered" \
            || echo "Warning: Netlify rebuild trigger failed"
