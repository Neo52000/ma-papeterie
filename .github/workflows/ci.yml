# CI — Validation avant merge
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + TypeCheck + Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Astro types
        run: npx astro sync
      - name: Validate netlify.toml syntax
        run: npx @taplo/cli fmt --check netlify.toml
      - name: ESLint
        run: npm run lint
      - name: TypeScript check
        run: npm run typecheck

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: validate
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder
      VITE_SUPABASE_PUBLISHABLE_KEY: placeholder
      VITE_SUPABASE_PROJECT_ID: placeholder
      VITE_API_URL: https://placeholder.api
      VITE_SHOPIFY_STOREFRONT_TOKEN: placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Check bundle size
        run: |
          echo "Bundle size"
          du -sh dist/

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test -- --reporter=verbose
