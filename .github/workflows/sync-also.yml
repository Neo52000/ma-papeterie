name: Sync ALSO SFTP

on:
  schedule:
    - cron: '0 4 * * *'    # Daily at 04:00 UTC (06:00 CET)
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test SFTP connection only (no import)'
        type: boolean
        default: false
      mode:
        description: 'Import mode'
        type: choice
        options:
          - enrich
          - create
        default: enrich

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install ssh2-sftp-client@11 fflate@0.8

      - name: Run ALSO SFTP sync
        env:
          ALSO_SFTP_HOST: ${{ secrets.ALSO_SFTP_HOST }}
          ALSO_SFTP_USER: ${{ secrets.ALSO_SFTP_USER }}
          ALSO_SFTP_PASSWORD: ${{ secrets.ALSO_SFTP_PASSWORD }}
          ALSO_SFTP_PATH: ${{ secrets.ALSO_SFTP_PATH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          API_CRON_SECRET: ${{ secrets.API_CRON_SECRET }}
          TEST_ONLY: ${{ inputs.test_only || 'false' }}
          IMPORT_MODE: ${{ inputs.mode || 'enrich' }}
        run: node scripts/sync-also-sftp.mjs

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Sync ALSO SFTP failed (${new Date().toISOString().slice(0,10)})`,
              body: `The scheduled ALSO SFTP sync workflow failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Time:** ${new Date().toISOString()}`,
              labels: ['sync-failure', 'automated']
            });
