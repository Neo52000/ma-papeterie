name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # — 1. TypeScript check ——————————————————————————————
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

  # — 2. Tests ————————————————————————————————————————
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --reporter=verbose

  # — 3. Supabase ————————————————————————————————————
  # Indépendant du typecheck frontend : les Edge Functions sont en Deno
  # et les erreurs TS résiduelles côté React ne doivent pas bloquer
  # le déploiement des fonctions / migrations.
  supabase:
    name: Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link projet
        run: supabase link --project-ref mgojmkzovqgpipybelrr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Appliquer les migrations
        continue-on-error: true
        run: yes | supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Déployer toutes les edge functions
        run: supabase functions deploy --project-ref mgojmkzovqgpipybelrr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
