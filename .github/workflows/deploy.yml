name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # — 1. TypeScript check ——————————————————————————————
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Astro types
        run: npx astro sync

      - name: TypeScript check
        run: npm run typecheck

  # — 2. Tests ————————————————————————————————————————
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --reporter=verbose

  # — 3. Supabase ————————————————————————————————————
  # Indépendant du typecheck frontend : les Edge Functions sont en Deno
  # et les erreurs TS résiduelles côté React ne doivent pas bloquer
  # le déploiement des fonctions / migrations.
  supabase:
    name: Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link projet
        run: supabase link --project-ref mgojmkzovqgpipybelrr
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Appliquer les migrations
        continue-on-error: true
        run: yes | supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Déployer les edge functions (par fonction, tolérant)
        run: |
          set +e
          FAILED=()
          SUCCEEDED=()
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            # Skip _shared and other non-function directories
            if [[ "$fn" == _* ]]; then
              continue
            fi
            # Only deploy if index.ts exists
            if [[ ! -f "$dir/index.ts" ]]; then
              echo "::warning::Skipping $fn (pas d'index.ts)"
              continue
            fi
            echo "::group::Deploy $fn"
            if supabase functions deploy "$fn" --project-ref mgojmkzovqgpipybelrr; then
              SUCCEEDED+=("$fn")
              echo "::endgroup::"
            else
              FAILED+=("$fn")
              echo "::endgroup::"
              echo "::warning::Échec du déploiement de $fn"
            fi
          done
          echo ""
          echo "======================================"
          echo "Résumé : ${#SUCCEEDED[@]} succès, ${#FAILED[@]} échecs"
          echo "======================================"
          if (( ${#FAILED[@]} > 0 )); then
            echo "Fonctions en échec :"
            printf '  - %s\n' "${FAILED[@]}"
          fi
          # Ne casse le job que si TOUTES les fonctions ont échoué
          if (( ${#SUCCEEDED[@]} == 0 )); then
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
