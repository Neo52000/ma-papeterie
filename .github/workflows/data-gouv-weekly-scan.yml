name: Data.gouv Weekly Prospect Scan

on:
  schedule:
    - cron: "0 6 * * 1" # Lundi 06:00 UTC
  workflow_dispatch:
    inputs:
      depts:
        description: "Départements (liste JSON, ex: [\"52\",\"10\"])"
        required: false
        default: '["52","10","51","55","88"]'
        type: string
      segments:
        description: "Segments cibles (liste JSON, ex: [\"educational\",\"public\"])"
        required: false
        default: '["educational","public","liberal"]'
        type: string
      new_since_days:
        description: "Nouvelles créations depuis N jours"
        required: false
        default: "7"
        type: string
      limit_per_segment:
        description: "Cap de prospects par segment/département"
        required: false
        default: "50"
        type: string

jobs:
  scan:
    name: Scan hebdomadaire data.gouv
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Call Edge Function
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_SECRET: ${{ secrets.SUPABASE_API_SECRET }}
          DEPTS: ${{ inputs.depts || '["52","10","51","55","88"]' }}
          SEGMENTS: ${{ inputs.segments || '["educational","public","liberal"]' }}
          NEW_SINCE_DAYS: ${{ inputs.new_since_days || '7' }}
          LIMIT_PER_SEGMENT: ${{ inputs.limit_per_segment || '50' }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_API_SECRET:-}" ]; then
            echo "::error::SUPABASE_URL or SUPABASE_API_SECRET secret is missing"
            exit 1
          fi
          body=$(cat <<EOF
          {
            "depts": ${DEPTS},
            "segments": ${SEGMENTS},
            "new_since_days": ${NEW_SINCE_DAYS},
            "limit_per_segment": ${LIMIT_PER_SEGMENT}
          }
          EOF
          )
          response=$(curl -sS -w "\n%{http_code}" \
            -X POST "${SUPABASE_URL}/functions/v1/data-gouv-weekly-scan" \
            -H "x-api-secret: ${SUPABASE_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$body")
          http_code=$(echo "$response" | tail -n1)
          resp_body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$resp_body" | jq '.' || echo "$resp_body"
          if [ "$http_code" -ge 400 ]; then
            echo "::error::Edge function returned HTTP $http_code"
            exit 1
          fi

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Weekly prospect scan failed (${new Date().toISOString().slice(0,10)})`,
              body: `The scheduled data.gouv weekly prospect scan workflow failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['sync-failure', 'automated']
            });
