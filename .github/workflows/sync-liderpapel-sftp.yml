name: Sync Liderpapel SFTP

on:
  schedule:
    - cron: '0 5 * * *'    # Daily at 05:00 UTC (07:00 CET)
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test SFTP connection only (no file download)'
        type: boolean
        default: false
      from_storage:
        description: 'Skip SFTP — read files already uploaded to Supabase Storage'
        type: boolean
        default: false
      storage_path:
        description: 'Storage folder path (e.g. "imports/2026-03-20" or "manual"). Leave empty for auto-detect.'
        type: string
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install SFTP client
        if: ${{ inputs.from_storage != true }}
        run: npm install ssh2-sftp-client@11

      - name: Install sshpass
        if: ${{ inputs.from_storage != true }}
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Open SSH tunnel via VPS
        id: tunnel
        if: ${{ inputs.from_storage != true }}
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          SFTP_HOST: ${{ secrets.LIDERPAPEL_SFTP_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "Opening SSH tunnel: localhost:2222 -> $SFTP_HOST:22 via $VPS_HOST"
          sshpass -p "$VPS_PASSWORD" ssh -f -N \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=60 \
            -o ConnectTimeout=15 \
            -L 2222:$SFTP_HOST:22 \
            $VPS_USER@$VPS_HOST
          sleep 2
          if ss -tln | grep -q ':2222'; then
            echo "SSH tunnel established on port 2222"
            echo "tunnel_ok=true" >> $GITHUB_OUTPUT
          else
            echo "WARNING: SSH tunnel failed — script will fall back to direct connection"
            echo "tunnel_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Run sync
        env:
          USE_TUNNEL: ${{ steps.tunnel.outputs.tunnel_ok == 'true' && 'true' || 'false' }}
          TUNNEL_PORT: '2222'
          LIDERPAPEL_SFTP_HOST: ${{ secrets.LIDERPAPEL_SFTP_HOST }}
          LIDERPAPEL_SFTP_USER: ${{ secrets.LIDERPAPEL_SFTP_USER }}
          LIDERPAPEL_SFTP_PASSWORD: ${{ secrets.LIDERPAPEL_SFTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ONLY: ${{ inputs.test_only || 'false' }}
          FROM_STORAGE: ${{ inputs.from_storage || 'false' }}
          STORAGE_PATH: ${{ inputs.storage_path || '' }}
        run: node scripts/sync-liderpapel-sftp.mjs

      - name: Cleanup tunnel
        if: always()
        run: |
          pkill -f "ssh.*-L 2222" || true
          echo "Tunnel cleaned up"
