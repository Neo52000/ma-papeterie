name: Sync Liderpapel SFTP

on:
  schedule:
    - cron: '30 0 * * *'   # Daily at 00:30 UTC (same as old Supabase cron)
  workflow_dispatch:
    inputs:
      test_only:
        description: 'Test SFTP connection only (no file download)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SFTP client
        run: npm install ssh2-sftp-client@11

      - name: Run SFTP sync
        env:
          LIDERPAPEL_SFTP_HOST: ${{ secrets.LIDERPAPEL_SFTP_HOST }}
          LIDERPAPEL_SFTP_USER: ${{ secrets.LIDERPAPEL_SFTP_USER }}
          LIDERPAPEL_SFTP_PASSWORD: ${{ secrets.LIDERPAPEL_SFTP_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ONLY: ${{ inputs.test_only || 'false' }}
        run: node scripts/sync-liderpapel-sftp.mjs
